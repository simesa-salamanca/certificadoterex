<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Certificado SIMESA</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
  }
  .container {

    margin: auto;
    background: white;
    padding: 20px;
  }
  h1 {
    text-align: center;
    color: #555;
  }
  .row {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: #eee;
    margin-bottom: 5px;
  }
  .label {
    font-weight: bold;
  }
  input {
    border: none;
    background: transparent;
    width: 60%;
    text-align: right;
  }
</style>
</head>
<body>

<div class="container">
  <h1 contenteditable="true">SIMESA</h1>
  <h2 contenteditable="true" style="text-align:center;">JC CRANE</h2>

  </div>

  <div class="row">
    <div class="label">Emisión</div>
    <input value="23 julio 2026">
  </div>
  <div class="row">
    <div class="label">Expira</div>
    <input value="23 julio 2027">
  </div>

  <div class="row">
    <div class="label">Equipo</div>
    <input value="Grúa Hidráulica">
  </div>

  <div class="row">
    <div class="label">Marca</div>
    <input value="Terex">
  </div>

  <div class="row">

    <input value="BT3470">
  </div>

  <div class="row">
    <div class="label">No. Serie</div>
    <input value="3HAMMAAR97L572430">
  </div>

  <div class="row">
    <div class="label">Capacidad</div>
    <input value="34,000 Ibs ">
  </div>

  <p contenteditable="true" style="text-align:center; margin-top:20px;">
    Verificación realizada correctamente
  </p>
</div>

</body>
</html>
